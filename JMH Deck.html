  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

klch(0.54 0.14 240 / 0.07);\n\n  --sage:           oklch(0.60 0.09 148);\n  --sage-fill:      oklch(0.60 0.09 148 / 0.12);\n  --sage-ring:      oklch(0.60 0.09 148 / 0.25);\n\n  --gold:           oklch(0.72 0.10 88);\n  --gold-fill:      oklch(0.72 0.10 88 / 0.12);\n  --gold-ring:      oklch(0.72 0.10 88 / 0.25);\n\n  --coral:          oklch(0.60 0.15 22);\n\n  /* Type scale (slide-optimised, ~0.67× of 1920×1080) */\n  --t-h1:     62px;\n  --t-h2:     40px;\n  --t-h3:     26px;\n  --t-body:   17px;\n  --t-small:  14px;\n  --t-label:  11px;\n  --t-badge:  10px;\n\n  /* Layout */\n  --px: 72px;\n  --py: 52px;\n  --font: 'DM Sans', system-ui, -apple-system, sans-serif;\n}\n\n*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }\nbody { background: #000; font-family: var(--font); -webkit-font-smoothing: antialiased; }\n\n/* ── SLIDE BASE ───────────────────────────────── */\ndeck-stage section {\n  background: var(--bg);\n  font-family: var(--font);\n  overflow: hidden;\n}\n\n/* ── LOGO ─────────────────────────────────────── */\n.logo {\n  position: absolute;\n  top: var(--py);\n  left: var(--px);\n  display: flex;\n  align-items: center;\n  gap: 9px;\n  z-index: 20;\n}\n.logo-mark {\n  width: 28px; height: 28px;\n  border-radius: 7px;\n  background: var(--blue);\n  display: flex; align-items: center; justify-content: center;\n  color: #fff;\n  font-size: 16px; font-weight: 700;\n  letter-spacing: -0.01em;\n  flex-shrink: 0;\n}\n.logo-word {\n  font-size: 15px; font-weight: 700;\n  color: var(--text-primary);\n  letter-spacing: -0.01em;\n}\n\n/* ── SECTION LABEL ───────────────────────────── */\n.section-lbl {\n  position: absolute;\n  top: calc(var(--py) + 36px);\n  left: var(--px);\n  font-size: var(--t-label);\n  font-weight: 600;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--blue);\n  z-index: 20;\n}\n\n/* ── SLIDE NUMBER ─────────────────────────────── */\n.slide-n {\n  position: absolute;\n  bottom: var(--py);\n  right: var(--px);\n  font-size: var(--t-label);\n  font-weight: 500;\n  letter-spacing: 0.06em;\n  color: var(--text-faint);\n}\n\n/* ── TRUST PILLS ──────────────────────────────── */\n.pill {\n  display: inline-flex;\n  align-items: center;\n  gap: 6px;\n  padding: 5px 11px 5px 8px;\n  border-radius: 999px;\n  font-size: var(--t-badge);\n  font-weight: 600;\n  letter-spacing: 0.08em;\n  text-transform: uppercase;\n}\n.pill-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }\n.pill-muted  { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }\n.pill-muted  .pill-dot { background: var(--text-muted); }\n.pill-blue   { background: var(--blue-fill); border: 1px solid var(--blue-ring); color: var(--blue); }\n.pill-blue   .pill-dot { background: var(--blue); }\n.pill-sage   { background: var(--sage-fill); border: 1px solid var(--sage-ring); color: var(--sage); }\n.pill-sage   .pill-dot { background: var(--sage); }\n.pill-gold   { background: var(--gold-fill); border: 1px solid var(--gold-ring); color: var(--gold); }\n.pill-gold   .pill-dot { background: var(--gold); }\n\n/* ── ICON ROWS ────────────────────────────────── */\n.icon-rows { display: flex; flex-direction: column; gap: 16px; }\n.irow { display: flex; align-items: flex-start; gap: 14px; }\n.iwell {\n  width: 40px; height: 40px; flex-shrink: 0;\n  border-radius: 11px;\n  background: var(--blue-fill);\n  border: 1px solid oklch(0.54 0.14 240 / 0.18);\n  display: flex; align-items: center; justify-content: center;\n}\n.irow-label { font-size: var(--t-small); font-weight: 600; color: var(--text-primary); line-height: 1.25; }\n.irow-sub   { font-size: 13px; font-weight: 400; color: var(--text-muted); line-height: 1.5; margin-top: 2px; }\n\n/* ── PHONE FRAME ──────────────────────────────── */\n.phone-wrap {\n  position: relative;\n  display: inline-flex;\n  flex-direction: column;\n  align-items: center;\n}\n.phone-glow {\n  position: absolute;\n  bottom: -40px;\n  left: 50%; transform: translateX(-50%);\n  width: 280px; height: 240px;\n  border-radius: 50%;\n  background: radial-gradient(ellipse at center, oklch(0.54 0.14 240 / 0.18) 0%, transparent 65%);\n  pointer-events: none;\n  z-index: 0;\n}\n.phone {\n  position: relative; z-index: 1;\n  width: 242px;\n  border-radius: 38px;\n  background: oklch(0.09 0.012 240);\n  border: 8px solid oklch(0.14 0.018 240);\n  box-shadow:\n    0 0 0 1px var(--border),\n    0 40px 80px var(--blue-glow),\n    0 8px 24px oklch(0 0 0 / 0.5);\n  overflow: hidden;\n}\n.phone-notch {\n  height: 22px;\n  display: flex;\n  align-items: flex-end;\n  justify-content: center;\n  padding-bottom: 3px;\n}\n.phone-notch-pill {\n  width: 72px; height: 10px;\n  border-radius: 0 0 8px 8px;\n  background: oklch(0.09 0.012 240);\n}\n.phone-screen {\n  background: oklch(0.980 0.007 240);\n  border-radius: 0 0 30px 30px;\n  overflow: hidden;\n}\n\n/* ── SCREEN INTERNALS (JMH light theme) ──────── */\n.sc { font-family: var(--font); font-size: 13px; color: oklch(0.20 0.035 245); }\n.sc-progress { display: flex; align-items: center; gap: 10px; }\n.sc-bar-track { flex: 1; height: 3px; background: oklch(0.54 0.14 240 / 0.12); border-radius: 99px; overflow: hidden; }\n.sc-bar-fill  { height: 100%; background: oklch(0.54 0.14 240); border-radius: 99px; }\n.sc-q { font-size: 16px; font-weight: 700; letter-spacing: -0.02em; line-height: 1.2; color: oklch(0.20 0.035 245); }\n.sc-qs { font-size: 10px; color: oklch(0.64 0.018 245); line-height: 1.5; margin-top: 4px; }\n.sc-pill {\n  padding: 9px 14px;\n  border-radius: 10px;\n  font-size: 12px; font-weight: 500;\n  color: oklch(0.20 0.035 245);\n  border: 1px solid oklch(0.91 0.012 240);\n  background: #fff;\n  display: flex; align-items: center; gap: 9px;\n  cursor: pointer;\n}\n.sc-pill.selected {\n  border: 2px solid oklch(0.54 0.14 240);\n  background: oklch(0.54 0.14 240 / 0.07);\n  color: oklch(0.54 0.14 240);\n  font-weight: 600;\n}\n.sc-cta {\n  width: 100%; padding: 11px;\n  border-radius: 999px;\n  background: oklch(0.54 0.14 240);\n  color: #fff;\n  font-family: var(--font); font-size: 13px; font-weight: 700;\n  border: none; cursor: pointer;\n  letter-spacing: -0.01em;\n}\n.sc-src {\n  display: flex; align-items: center; justify-content: center; gap: 5px;\n  font-size: 9px; font-weight: 600; letter-spacing: 0.05em;\n  color: oklch(0.64 0.018 245);\n  text-transform: uppercase;\n}\n.sc-navrow {\n  display: flex;\n  background: #fff;\n  border-top: 1px solid oklch(0.91 0.012 240);\n  padding: 7px 0 14px;\n}\n.sc-navtab {\n  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;\n  font-size: 8px; font-weight: 500; color: oklch(0.64 0.018 245);\n}\n.sc-navtab.active { color: oklch(0.54 0.14 240); font-weight: 700; }\n\n/* ── DECORATIVE ARCS ──────────────────────────── */\n.arc-deco { position: absolute; pointer-events: none; overflow: hidden; }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<deck-stage width=\"1280\" height=\"720\">\n\n<!-- ═══════════════════════════════════════════\n     SLIDE 01 — TITLE HERO\n     \"The logic your move has been missing.\"\n═══════════════════════════════════════════ -->\n<section data-screen-label=\"01 Title\">\n\n  <!-- Background: dark base + radial blue wash top-right -->\n  <div style=\"position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 110% -10%, oklch(0.54 0.14 240 / 0.09) 0%, transparent 58%);\"><\u002Fdiv>\n\n  <!-- Concentric arc brand decoration, top-right -->\n  <div class=\"arc-deco\" style=\"top:-160px;right:-160px;width:520px;height:520px;\">\n    <svg width=\"520\" height=\"520\" viewBox=\"0 0 520 520\" fill=\"none\">\n      <circle cx=\"520\" cy=\"0\" r=\"200\" stroke=\"var(--blue-arc)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"520\" cy=\"0\" r=\"270\" stroke=\"oklch(0.54 0.14 240 / 0.05)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"520\" cy=\"0\" r=\"340\" stroke=\"oklch(0.54 0.14 240 / 0.04)\" stroke-width=\"1\"><\u002Fcircle>\n      <circle cx=\"520\" cy=\"0\" r=\"420\" stroke=\"oklch(0.54 0.14 240 / 0.03)\" stroke-width=\"1\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <!-- Subtle grid texture -->\n  <div style=\"position:absolute;inset:0;background-image:linear-gradient(oklch(0.54 0.14 240 / 0.025) 1px,transparent 1px),linear-gradient(90deg,oklch(0.54 0.14 240 / 0.025) 1px,transparent 1px);background-size:80px 80px;\"><\u002Fdiv>\n\n  <!-- ── LOGO ── -->\n  <div class=\"logo\">\n    <div class=\"logo-mark\">J<\u002Fdiv>\n    <span class=\"logo-word\">JMH<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- ── SECTION LABEL ── -->\n  <div class=\"section-lbl\">INTRO · 01<\u002Fdiv>\n\n  <!-- ══════════════════════════════════════════\n       LEFT COLUMN — COPY\n  ════════════════════════════════════════════ -->\n  <div style=\"position:absolute;top:0;left:0;width:596px;height:720px;display:flex;flex-direction:column;justify-content:center;padding:80px var(--px) var(--py);\">\n\n    <!-- H1 -->\n    <h1 style=\"font-size:var(--t-h1);font-weight:700;letter-spacing:-0.03em;line-height:1.08;color:var(--text-primary);max-width:480px;\">\n      Your move, without the chaos.\n    <\u002Fh1>\n\n    <!-- Icon rows -->\n    <div class=\"icon-rows\" style=\"margin-top:40px;\">\n\n      <div class=\"irow\">\n        <div class=\"iwell\">\n          <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--blue)\" stroke-width=\"1.5\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n            <circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle>\n            <path d=\"M2 12h20\"><\u002Fpath>\n            <path d=\"M12 2a15.3 15.3 0 010 20M12 2a15.3 15.3 0 000 20\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div>\n          <div class=\"irow-label\">City-specific. Government-verified.<\u002Fdiv>\n          <div class=\"irow-sub\">Every answer cites its source — starting with Berlin.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n
