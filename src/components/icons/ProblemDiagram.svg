<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500">
  <style>
    .lbl { font-family: 'Gloock', Georgia, serif; }
    .sub { font-family: 'Literata', Georgia, serif; }
  </style>

  <!-- Background -->
  <rect width="960" height="500" fill="#f8f5f0"/>

  <!-- Chaos lines from person (265,250) to each source node center -->
  <line x1="265" y1="250" x2="110" y2="80" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="290" y2="50" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="455" y2="80" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="80" y2="175" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="480" y2="190" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="500" y2="305" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="455" y2="400" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="285" y2="445" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="105" y2="410" stroke="#ccc9c5" stroke-width="1"/>
  <line x1="265" y1="250" x2="80" y2="308" stroke="#ccc9c5" stroke-width="1"/>

  <!-- Germany.de -->
  <rect x="50" y="65" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="110" y="84" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Germany.de</text>

  <!-- BAMF -->
  <rect x="230" y="35" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="290" y="54" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">BAMF</text>

  <!-- Berlin Senat -->
  <rect x="395" y="65" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="455" y="84" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Berlin Senat</text>

  <!-- Facebook Group -->
  <rect x="20" y="160" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="80" y="179" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Facebook Group</text>

  <!-- WhatsApp -->
  <rect x="420" y="175" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="480" y="194" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">WhatsApp</text>

  <!-- Your HR -->
  <rect x="440" y="290" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="500" y="309" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Your HR</text>

  <!-- Reddit expats -->
  <rect x="395" y="385" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="455" y="404" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Reddit expats</text>

  <!-- Random blog -->
  <rect x="225" y="430" width="120" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="285" y="449" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Random blog</text>

  <!-- Steuerberater -->
  <rect x="40" y="395" width="130" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="105" y="414" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Steuerberater</text>

  <!-- Wohnungsmarkt -->
  <rect x="15" y="293" width="130" height="30" rx="6" fill="#f2eeea" stroke="#a8a4a0" stroke-width="1"/>
  <text x="80" y="312" text-anchor="middle" class="lbl" font-size="11" fill="#6b6760">Wohnungsmarkt</text>

  <!-- Person figure (drawn above lines) -->
  <circle cx="265" cy="230" r="10" fill="#f8f5f0" stroke="#1f1e1b" stroke-width="1.5"/>
  <line x1="265" y1="240" x2="265" y2="265" stroke="#1f1e1b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="248" y1="252" x2="282" y2="252" stroke="#1f1e1b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="265" y1="265" x2="253" y2="282" stroke="#1f1e1b" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="265" y1="265" x2="277" y2="282" stroke="#1f1e1b" stroke-width="1.5" stroke-linecap="round"/>
  <text x="265" y="298" text-anchor="middle" class="lbl" font-size="11" fill="#1f1e1b">You</text>

  <!-- Vertical divider -->
  <line x1="582" y1="30" x2="582" y2="470" stroke="#d4d0cb" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- JMH node -->
  <rect x="685" y="215" width="180" height="70" rx="12" fill="#e8f2f0" stroke="#2d7a6e" stroke-width="2"/>
  <text x="775" y="246" text-anchor="middle" class="lbl" font-size="22" fill="#2d7a6e">JMH</text>
  <text x="775" y="268" text-anchor="middle" class="sub" font-size="11" font-style="italic" fill="#2d7a6e">One source. Every answer.</text>
</svg>
