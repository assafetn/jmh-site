<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700">
  <style>
    .lbl { font-family: 'Gloock', Georgia, serif; }
    .sub { font-family: 'Literata', Georgia, serif; }
  </style>

  <rect width="960" height="700" fill="#f8f6f3"/>

  <defs>
    <marker id="vd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#2d7a6b"/>
    </marker>
    <marker id="pu" markerWidth="9" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 9 3 L 0 6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="vd-sm" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#2d7a6b"/>
    </marker>
  </defs>

  <!-- Layer spine labels -->
  <text transform="translate(22,92) rotate(-90)" text-anchor="middle" class="sub" font-size="8" fill="#c8c4be" letter-spacing="0.12em">INPUT</text>
  <text transform="translate(22,290) rotate(-90)" text-anchor="middle" class="sub" font-size="8" fill="#c8c4be" letter-spacing="0.12em">ENGINE</text>
  <text transform="translate(22,505) rotate(-90)" text-anchor="middle" class="sub" font-size="8" fill="#c8c4be" letter-spacing="0.12em">OUTPUT</text>

  <!-- ─── LAYER 1: USER QUESTION ─── -->
  <rect x="375" y="48" width="210" height="70" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.5"/>
  <!-- MessageSquare icon -->
  <g transform="translate(400,68)">
    <rect x="0" y="0" width="14" height="11" rx="2" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <path d="M 2,11 L 2,15 L 6,11" fill="none" stroke="#2d7a6b" stroke-width="1.2" stroke-linejoin="round"/>
  </g>
  <text x="454" y="74" class="lbl" font-size="13" fill="#1a3d36">User Question</text>
  <text x="454" y="90" class="sub" font-size="10" font-style="italic" fill="#6b6760">in plain language</text>

  <!-- Query arrow -->
  <line x1="480" y1="118" x2="480" y2="188" stroke="#2d7a6b" stroke-width="1.5" marker-end="url(#vd)"/>
  <text x="492" y="156" class="sub" font-size="10" fill="#2d7a6b">query</text>

  <!-- ─── ENGINE CONTAINER ─── -->
  <rect x="75" y="190" width="760" height="195" rx="6" fill="none" stroke="#2d7a6b" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Corner crosses -->
  <line x1="65" y1="190" x2="85" y2="190" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="75" y1="180" x2="75" y2="200" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="825" y1="190" x2="845" y2="190" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="835" y1="180" x2="835" y2="200" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="65" y1="385" x2="85" y2="385" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="75" y1="375" x2="75" y2="395" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="825" y1="385" x2="845" y2="385" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <line x1="835" y1="375" x2="835" y2="395" stroke="#2d7a6b" stroke-width="0.7" opacity="0.35"/>
  <!-- Engine label -->
  <text x="100" y="212" class="sub" font-size="9" fill="#2d7a6b" letter-spacing="0.1em" opacity="0.65">JMH TRUST STACK</text>
  <!-- Thin rule under engine label -->
  <line x1="100" y1="217" x2="820" y2="217" stroke="#2d7a6b" stroke-width="0.5" opacity="0.15"/>

  <!-- ─── TIER 1 SOURCES ─── -->
  <rect x="110" y="242" width="175" height="85" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.5"/>
  <!-- Database icon centered top -->
  <g transform="translate(189,250)">
    <ellipse cx="8" cy="3" rx="6" ry="2" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <path d="M 2,3 C 2,5.2 4.7,7 8,7 C 11.3,7 14,5.2 14,3" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <path d="M 2,9 C 2,11.2 4.7,13 8,13 C 11.3,13 14,11.2 14,9" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <line x1="2" y1="3" x2="2" y2="15" stroke="#2d7a6b" stroke-width="1.2"/>
    <line x1="14" y1="3" x2="14" y2="15" stroke="#2d7a6b" stroke-width="1.2"/>
  </g>
  <text x="197" y="278" text-anchor="middle" class="lbl" font-size="11" fill="#1a3d36">Tier 1 Sources</text>
  <text x="197" y="292" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#6b6760">Gov sites, official bodies</text>
  <text x="197" y="306" text-anchor="middle" class="sub" font-size="9" fill="#a8a4a0">DE Bundesamt · BAMF · Senat</text>

  <!-- ─── HYBRID RAG (center, larger) ─── -->
  <rect x="384" y="237" width="192" height="90" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="2"/>
  <!-- Cpu icon centered top -->
  <g transform="translate(472,245)">
    <rect x="3" y="3" width="10" height="10" rx="1" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <line x1="5" y1="0" x2="5" y2="3" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="11" y1="0" x2="11" y2="3" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="5" y1="13" x2="5" y2="16" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="11" y1="13" x2="11" y2="16" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="0" y1="5" x2="3" y2="5" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="0" y1="11" x2="3" y2="11" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="13" y1="5" x2="16" y2="5" stroke="#2d7a6b" stroke-width="1"/>
    <line x1="13" y1="11" x2="16" y2="11" stroke="#2d7a6b" stroke-width="1"/>
    <rect x="5" y="5" width="6" height="6" rx="0.5" fill="none" stroke="#2d7a6b" stroke-width="1"/>
  </g>
  <text x="480" y="273" text-anchor="middle" class="lbl" font-size="13" fill="#1a3d36">Hybrid RAG</text>
  <text x="480" y="287" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#6b6760">LLM + verified retrieval</text>
  <text x="480" y="300" text-anchor="middle" class="sub" font-size="9" fill="#a8a4a0">answers only from verified corpus</text>

  <!-- ─── TIER 2 SOURCES ─── -->
  <rect x="660" y="242" width="175" height="85" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.5"/>
  <!-- BookOpen icon centered top -->
  <g transform="translate(739,251)">
    <path d="M 0,3 L 0,14 L 8,12 L 8,1 Z" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <path d="M 16,3 L 16,14 L 8,12 L 8,1 Z" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
  </g>
  <text x="747" y="278" text-anchor="middle" class="lbl" font-size="11" fill="#1a3d36">Tier 2 Sources</text>
  <text x="747" y="292" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#6b6760">Vetted legal + tax resources</text>
  <text x="747" y="306" text-anchor="middle" class="sub" font-size="9" fill="#a8a4a0">Jurisdiction-tagged, deduplicated</text>

  <!-- ─── ARROWS INSIDE ENGINE ─── -->
  <line x1="285" y1="284" x2="382" y2="284" stroke="#2d7a6b" stroke-width="1.5" marker-end="url(#vd)"/>
  <text x="334" y="276" text-anchor="middle" class="sub" font-size="9" fill="#2d7a6b">retrieves</text>
  <line x1="660" y1="284" x2="578" y2="284" stroke="#2d7a6b" stroke-width="1.5" marker-end="url(#vd)"/>
  <text x="619" y="276" text-anchor="middle" class="sub" font-size="9" fill="#2d7a6b">cross-checks</text>

  <!-- ─── FEEDBACK LOOP (purple dashed) ─── -->
  <path d="M 576,252 C 680,218 820,222 875,262" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="5,3" opacity="0.8"/>
  <path d="M 875,305 C 820,340 680,338 576,310" stroke="#7c3aed" stroke-width="1.2" fill="none" stroke-dasharray="5,3" marker-end="url(#pu)" opacity="0.8"/>
  <text x="728" y="215" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#7c3aed">self-verifies</text>
  <!-- RefreshCw icon (floating, right of engine) -->
  <g transform="translate(867,272)">
    <path d="M 14,6 A 6,6 0 0,0 2,8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <polyline points="14,2 14,6 10,6" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 2,10 A 6,6 0 0,0 14,8" fill="none" stroke="#7c3aed" stroke-width="1.5"/>
    <polyline points="2,14 2,10 6,10" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-linejoin="round"/>
  </g>
  <text x="883" y="305" text-anchor="middle" class="sub" font-size="8" fill="#7c3aed">Check-Your-Work</text>
  <text x="883" y="317" text-anchor="middle" class="sub" font-size="8" fill="#7c3aed">Intelligence</text>

  <!-- ─── GROUNDED RESPONSE ARROW ─── -->
  <line x1="480" y1="385" x2="480" y2="476" stroke="#2d7a6b" stroke-width="1.5" marker-end="url(#vd)"/>
  <text x="492" y="432" class="sub" font-size="9" fill="#2d7a6b">grounded response</text>

  <!-- ─── LAYER 4: CITED ANSWER ─── -->
  <rect x="384" y="478" width="192" height="65" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.5"/>
  <!-- FileCheck icon -->
  <g transform="translate(408,494)">
    <path d="M 2,0 L 10,0 L 14,4 L 14,16 L 2,16 Z" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <path d="M 10,0 L 10,4 L 14,4" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <polyline points="5,9 7,11 11,7" fill="none" stroke="#2d7a6b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="453" y="502" class="lbl" font-size="13" fill="#1a3d36">Cited Answer</text>
  <text x="453" y="517" class="sub" font-size="10" font-style="italic" fill="#6b6760">every answer names its source</text>
  <text x="453" y="531" class="sub" font-size="9" fill="#a8a4a0">or declines when no source is available</text>

  <!-- ─── BRANCH TO SUB-NODES ─── -->
  <line x1="480" y1="543" x2="480" y2="562" stroke="#2d7a6b" stroke-width="1.2"/>
  <line x1="310" y1="562" x2="650" y2="562" stroke="#2d7a6b" stroke-width="1.2"/>
  <line x1="310" y1="562" x2="310" y2="578" stroke="#2d7a6b" stroke-width="1.2" marker-end="url(#vd-sm)"/>
  <line x1="650" y1="562" x2="650" y2="578" stroke="#2d7a6b" stroke-width="1.2" marker-end="url(#vd-sm)"/>

  <!-- Source shown -->
  <rect x="200" y="578" width="220" height="56" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.2"/>
  <!-- Link icon -->
  <g transform="translate(214,594)">
    <path d="M 6,8 C 6,9.7 7.3,11 9,11 L 11,11 C 12.7,11 14,9.7 14,8 C 14,6.3 12.7,5 11,5 L 10,5" fill="none" stroke="#2d7a6b" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M 10,8 C 10,6.3 8.7,5 7,5 L 5,5 C 3.3,5 2,6.3 2,8 C 2,9.7 3.3,11 5,11 L 6,11" fill="none" stroke="#2d7a6b" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <text x="310" y="601" text-anchor="middle" class="lbl" font-size="11" fill="#1a3d36">Source shown</text>
  <text x="310" y="615" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#6b6760">government source cited inline</text>

  <!-- Gaps flagged -->
  <rect x="540" y="578" width="220" height="56" rx="4" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="1.2"/>
  <!-- AlertCircle icon -->
  <g transform="translate(554,594)">
    <circle cx="8" cy="8" r="7" fill="none" stroke="#2d7a6b" stroke-width="1.2"/>
    <line x1="8" y1="4.5" x2="8" y2="8.5" stroke="#2d7a6b" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="8" cy="11.2" r="0.85" fill="#2d7a6b"/>
  </g>
  <text x="650" y="601" text-anchor="middle" class="lbl" font-size="11" fill="#1a3d36">Gaps flagged</text>
  <text x="650" y="615" text-anchor="middle" class="sub" font-size="9" font-style="italic" fill="#6b6760">if no verified source, JMH says so</text>

  <!-- ─── LEGEND ─── -->
  <line x1="100" y1="668" x2="135" y2="668" stroke="#2d7a6b" stroke-width="1.5"/>
  <path d="M 131,664 L 135,668 L 131,672 Z" fill="#2d7a6b"/>
  <text x="142" y="672" class="sub" font-size="10" fill="#6b6760">Verified data flow</text>
  <line x1="360" y1="668" x2="395" y2="668" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5,3"/>
  <path d="M 391,664 L 395,668 L 391,672 Z" fill="#7c3aed"/>
  <text x="402" y="672" class="sub" font-size="10" fill="#6b6760">Self-verification loop</text>

</svg>
