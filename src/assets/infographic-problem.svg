<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 560">
  <style>
    .lbl { font-family: 'Gloock', Georgia, serif; }
    .sub { font-family: 'Literata', Georgia, serif; }
  </style>

  <!-- Background -->
  <rect width="1200" height="560" fill="#f8f6f3"/>

  <defs>
    <!-- Chaos arrow marker (orange) -->
    <marker id="arr-chaos" markerWidth="7" markerHeight="5" refX="6.5" refY="2.5" orient="auto">
      <path d="M 0 0 L 7 2.5 L 0 5 Z" fill="#ea580c" opacity="0.8"/>
    </marker>
    <!-- Main JMH arrow marker (verdigris) -->
    <marker id="arr-main" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M 0 0 L 10 3.5 L 0 7 Z" fill="#2d7a6b"/>
    </marker>
    <!-- Output arrow marker (green) -->
    <marker id="arr-out" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6 Z" fill="#059669"/>
    </marker>
  </defs>

  <!-- ─── CHAOS LINES: source nodes → overwhelmed center ─── -->
  <!-- germany.de (95,90) → center (285,280) -->
  <line x1="112" y1="107" x2="264" y2="259" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- BAMF (255,45) → center -->
  <line x1="258" y1="69" x2="281" y2="250" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- Berlin Senat (435,85) → center -->
  <line x1="419" y1="103" x2="303" y2="261" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- WhatsApp (480,250) → center -->
  <line x1="456" y1="254" x2="315" y2="275" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- Reddit expats (415,450) → center -->
  <line x1="400" y1="431" x2="303" y2="304" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- Steuerberater (175,475) → center -->
  <line x1="187" y1="454" x2="270" y2="306" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>
  <!-- Facebook Group (50,370) → center -->
  <line x1="72" y1="361" x2="257" y2="291" stroke="#ea580c" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arr-chaos)" opacity="0.6"/>

  <!-- ─── MAIN ARROW: overwhelmed center → JMH ─── -->
  <path d="M 315,277 C 440,200 570,200 679,234" stroke="#2d7a6b" stroke-width="2.5" fill="none" marker-end="url(#arr-main)"/>

  <!-- ─── OUTPUT ARROWS: JMH → outputs ─── -->
  <path d="M 745,272 C 742,312 731,334 730,356" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-out)"/>
  <path d="M 780,272 C 780,312 860,332 860,356" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-out)"/>
  <path d="M 815,272 C 832,312 974,332 988,356" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-out)"/>

  <!-- ─── DIVIDER ─── -->
  <line x1="640" y1="25" x2="640" y2="535" stroke="#d4d0cb" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ─── SOURCE NODES ─── -->

  <!-- 1. germany.de (95, 90) — Globe icon -->
  <circle cx="95" cy="90" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="95" cy="90" r="9" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <line x1="86" y1="90" x2="104" y2="90" stroke="#ea580c" stroke-width="1"/>
  <line x1="95" y1="81" x2="95" y2="99" stroke="#ea580c" stroke-width="1"/>
  <path d="M 86,90 C 88,84 102,84 104,90 C 102,96 88,96 86,90" fill="none" stroke="#ea580c" stroke-width="0.8"/>
  <text x="95" y="128" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">germany.de</text>

  <!-- 2. BAMF (255, 45) — File icon -->
  <circle cx="255" cy="45" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="246" y="36" width="11" height="15" rx="1.5" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <line x1="248" y1="41" x2="255" y2="41" stroke="#ea580c" stroke-width="0.9"/>
  <line x1="248" y1="44" x2="255" y2="44" stroke="#ea580c" stroke-width="0.9"/>
  <line x1="248" y1="47" x2="255" y2="47" stroke="#ea580c" stroke-width="0.9"/>
  <text x="255" y="83" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">BAMF</text>

  <!-- 3. Berlin Senat (435, 85) — Building icon -->
  <circle cx="435" cy="85" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <rect x="427" y="79" width="16" height="13" rx="1" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <line x1="435" y1="79" x2="435" y2="92" stroke="#ea580c" stroke-width="1"/>
  <rect x="430" y="73" width="10" height="6" rx="1" fill="none" stroke="#ea580c" stroke-width="1"/>
  <text x="435" y="123" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Berlin Senat</text>

  <!-- 4. WhatsApp (480, 250) — Chat bubble icon -->
  <circle cx="480" cy="250" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="480" cy="248" r="9" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <path d="M 473,257 L 470,263 L 478,260" fill="#fff7ed" stroke="#ea580c" stroke-width="1.1" stroke-linejoin="round"/>
  <text x="480" y="288" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">WhatsApp</text>

  <!-- 5. Reddit expats (415, 450) — Users icon -->
  <circle cx="415" cy="450" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="409" cy="445" r="5.5" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <path d="M 403,456 C 403,450 415,450 415,456" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <circle cx="421" cy="446" r="4.5" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.65"/>
  <text x="415" y="488" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Reddit expats</text>

  <!-- 6. Steuerberater (175, 475) — Scale/balance icon -->
  <circle cx="175" cy="475" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <line x1="175" y1="466" x2="175" y2="484" stroke="#ea580c" stroke-width="1.2"/>
  <line x1="167" y1="470" x2="183" y2="470" stroke="#ea580c" stroke-width="1.2"/>
  <circle cx="163" cy="474" r="3.5" fill="none" stroke="#ea580c" stroke-width="1"/>
  <circle cx="187" cy="474" r="3.5" fill="none" stroke="#ea580c" stroke-width="1"/>
  <line x1="163" y1="470" x2="163" y2="474" stroke="#ea580c" stroke-width="1"/>
  <line x1="187" y1="470" x2="187" y2="474" stroke="#ea580c" stroke-width="1"/>
  <text x="175" y="513" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Steuerberater</text>

  <!-- 7. Facebook Group (50, 370) — Users icon -->
  <circle cx="50" cy="370" r="26" fill="#fff7ed" stroke="#ea580c" stroke-width="1.5"/>
  <circle cx="44" cy="365" r="5.5" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <path d="M 38,376 C 38,370 50,370 50,376" fill="none" stroke="#ea580c" stroke-width="1.2"/>
  <circle cx="57" cy="366" r="4.5" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.65"/>
  <text x="50" y="408" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Facebook Group</text>

  <!-- ─── OVERWHELMED CENTER (285, 280) ─── -->
  <circle cx="285" cy="280" r="32" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
  <text x="285" y="276" text-anchor="middle" class="lbl" font-size="20" fill="#dc2626">?</text>
  <text x="285" y="291" text-anchor="middle" class="sub" font-size="8" fill="#dc2626" letter-spacing="1">no answer</text>
  <text x="285" y="324" text-anchor="middle" class="sub" font-size="11" fill="#5c5855">You</text>

  <!-- ─── JMH BOX (680, 200, 200×72) ─── -->
  <rect x="680" y="200" width="200" height="72" rx="10" fill="#e8f2f0" stroke="#2d7a6b" stroke-width="2"/>
  <text x="780" y="234" text-anchor="middle" class="lbl" font-size="24" fill="#2d7a6b">JMH</text>
  <text x="780" y="257" text-anchor="middle" class="sub" font-size="11" font-style="italic" fill="#2d7a6b">One source. Every answer.</text>

  <!-- JMH label above -->
  <text x="780" y="184" text-anchor="middle" class="sub" font-size="9" fill="#a8a4a0" letter-spacing="2">VERIFIED SOURCE</text>

  <!-- ─── OUTPUT NODES ─── -->

  <!-- Cited Answers (730, 378) — Checkmark -->
  <circle cx="730" cy="378" r="22" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <path d="M 722,378 L 728,384 L 739,372" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="730" y="410" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Cited Answers</text>

  <!-- Proactive Alerts (860, 378) — Clock -->
  <circle cx="860" cy="378" r="22" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="860" cy="378" r="9" fill="none" stroke="#059669" stroke-width="1.5"/>
  <line x1="860" y1="370" x2="860" y2="378" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="860" y1="378" x2="866" y2="382" stroke="#059669" stroke-width="1.5" stroke-linecap="round"/>
  <text x="860" y="410" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Proactive Alerts</text>

  <!-- Living Profile (990, 378) — User + check -->
  <circle cx="990" cy="378" r="22" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <circle cx="985" cy="373" r="5" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M 979,384 C 979,379 991,379 991,384" fill="none" stroke="#059669" stroke-width="1.5"/>
  <path d="M 996,369 L 1000,373 L 1006,367" fill="none" stroke="#059669" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="990" y="410" text-anchor="middle" class="sub" font-size="10" fill="#5c5855">Living Profile</text>

</svg>
