document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-3 3v-3z\"><\u002Fpath><\u002Fsvg>Ask JMH<\u002Fspan>\n              <span style=\"flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:9px;font-weight:500;color:var(--text-muted);\"><svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"8\" r=\"4\"><\u002Fcircle><path d=\"M20 21a8 8 0 10-16 0\"><\u002Fpath><\u002Fsvg>Profile<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RIGHT COPY -->\n    <div>\n      <div data-reveal=\"0\" style=\"font-size:12px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:var(--jmh-blue);margin-bottom:14px;\">04 — Proactive Engine<\u002Fdiv>\n      <h2 data-reveal=\"60\" style=\"font-size:38px;font-weight:700;letter-spacing:-0.03em;line-height:1.12;color:var(--text-primary);margin:0 0 20px;max-width:460px;\">JMH watches your timeline. So you don't have to.<\u002Fh2>\n      <p data-reveal=\"100\" style=\"font-size:16px;line-height:1.7;color:var(--text-secondary);margin:0 0 32px;max-width:440px;\">You can't Google a deadline you don't know exists. JMH maps every regulatory window to your profile and alerts you before it closes.<\u002Fp>\n\n      <div style=\"display:flex;flex-direction:column;gap:12px;max-width:480px;\">\n        <div data-reveal=\"140\" style=\"display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm);\">\n          <span style=\"width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--jmh-blue-05);box-shadow:inset 0 0 0 1px var(--jmh-blue-10);display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--jmh-blue)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9\"><\u002Fpath><path d=\"M13.73 21a2 2 0 01-3.46 0\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <span style=\"display:block;\">\n            <span style=\"display:block;font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:3px;\">Your early warning system<\u002Fspan>\n            <span style=\"display:block;font-size:13px;color:var(--text-secondary);line-height:1.55;\">JMH doesn't wait for you to ask. It monitors deadlines tied to your move and pushes alerts before any window closes.<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div data-reveal=\"200\" style=\"display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--bg);border:1px solid var(--border);border-radius:12px;box-shadow:var(--shadow-sm);\">\n          <span style=\"width:38px;height:38px;flex-shrink:0;border-radius:50%;background:var(--jmh-blue-05);box-shadow:inset 0 0 0 1px var(--jmh-blue-10);display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"var(--jmh-blue)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"M12 8v4l3 3\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <span style=\"display:block;\">\n            <span style=\"display:block;font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:3px;\">Chain reaction logic<\u002Fspan>\n            <span style=\"display:block;font-size:13px;color:var(--text-secondary);line-height:1.55;\">Life changes don't stay in one category. Neither do JMH alerts. A visa change ripples into tax, insurance, and housing automatically.<\u002Fspan>\n          <\u002Fspan>\n        <\u002Fdiv>\n        <div data-reveal=\"260\" style=\"display:flex;align-items:flex-start;gap:14px;padding:16px 18px;background:var(--jmh-gold- .14 240 / 0.07) 0%, transparent 70%);pointer-events:none;\"><\u002Fdiv>\n\n  <div style=\"position:relative;max-width:1200px;margin:0 auto;padding:140px 32px 120px;display:flex;flex-direction:column;align-items:center;\">\n    <div data-reveal=\"0\" style=\"font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--jmh-blue);margin-bottom:20px;\">Closer · 09<\u002Fdiv>\n    <h2 data-reveal=\"60\" style=\"font-size:clamp(44px,5vw,60px);font-weight:700;letter-spacing:-0.035em;line-height:1.08;color:var(--text-primary);text-align:center;margin:0 0 24px;\">Your move. Finally handled.<\u002Fh2>\n    <p data-reveal=\"100\" style=\"font-size:17px;line-height:1.7;color:var(--text-secondary);text-align:center;max-width:660px;margin:0 0 36px;\">Living Profile. The Plan. Trust Chat. Proactive Engine. — Four pillars that turn relocation chaos into a guided, personal experience.<\u002Fp>\n\n    <div data-reveal=\"160\" style=\"display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:44px;\">\n      <span style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 14px 6px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;background:var(--jmh-blue-05);border:1px solid var(--jmh-blue-30);color:var(--jmh-blue);\"><span style=\"width:5px;height:5px;border-radius:50%;background:var(--jmh-blue);\"><\u002Fspan>Living Profile<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 14px 6px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;background:var(--jmh-blue-05);border:1px solid var(--jmh-blue-30);color:var(--jmh-blue);\"><span style=\"width:5px;height:5px;border-radius:50%;background:var(--jmh-blue);\"><\u002Fspan>The Plan<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 14px 6px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;background:var(--jmh-blue-05);border:1px solid var(--jmh-blue-30);color:var(--jmh-blue);\"><span style=\"width:5px;height:5px;border-radius:50%;background:var(--jmh-blue);\"><\u002Fspan>Trust Chat<\u002Fspan>\n      <span style=\"display:inline-flex;align-items:center;gap:7px;padding:6px 14px 6px 11px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;background:var(--jmh-blue-05);border:1px solid var(--jmh-blue-30);color:var(--jmh-blue);\"><span style=\"width:5px;height:5px;border-radius:50%;background:var(--jmh-blue);\"><\u002Fspan>Proactive Engine<\u002Fspan>\n    <\u002Fdiv>\n\n    <\u002Fdiv>\n\n  <!-- FOOTER -->\n  <div style=\"position:relative;border-top:1px solid var(--border);\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:24px 32px;display:flex;align-items:center;gap:12px;\">\n      <span style=\"width:24px;height:24px;border-radius:6px;background:var(--jmh-blue);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;\">J<\u002Fspan>\n      <span style=\"font-size:13px;font-weight:700;color:var(--text-primary);\">JMH<\u002Fspan>\n      <span style=\"margin-left:auto;font-size:12px;font-weight:500;color:var(--text-muted);letter-spacing:0.06em;\">JMH 2.0 — launching in Berlin. Expanding everywhere.<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n\n<!-- ══════════ DECK CONTROLS ══════════ -->\n<div data-deckui=\"1\" style=\"position:fixed;right:24px;bottom:24px;z-index:120;display:flex;align-items:center;gap:14px;\">\n  <span data-counter=\"1\" style=\"font-size:13px;font-weight:600;color:var(--text-muted);letter-spacing:0.04em;font-variant-numeric:tabular-nums;white-space:nowrap;background:oklch(1 0 0 / 0.9);padding:5px 10px;border-radius:999px;box-shadow:var(--shadow-sm);\">01 / 10<\u002Fspan>\n  <div style=\"display:flex;gap:8px;\">\n    <button data-prev=\"1\" aria-label=\"Previous\" style=\"width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:oklch(1 0 0 / 0.96);box-shadow:var(--shadow-sm);color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M18 15l-6-6-6 6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n    <button data-next=\"1\" aria-label=\"Next\" style=\"width:40px;height:40px;border-radius:999px;border:1px solid var(--border);background:oklch(1 0 0 / 0.96);box-shadow:var(--shadow-sm);color:var(--text-primary);display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;\">\n      <svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg>\n    <\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;scrollAnimations&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;phoneTilt&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;showGrid&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Background&quot;}}\">\nclass Component extends DCLogic {\n  state = { idx: 0 };\n  componentDidMount() {\n    this.applyAll();\n    this.deck = document.querySelector('[data-deck]');\n    this.slides = Array.from(document.querySelectorAll('[data-deck] > section'));\n\n    // Keyboard: up/down (also left/right, PageUp/Down, Space, Home/End) move one slide.\n    this._onKey = (e) => {\n      if (e.metaKey || e.ctrlKey || e.altKey) return;\n      const k = e.key;\n      if (k === 'ArrowDown' || k === 'ArrowRight' || k === 'PageDown' || k === ' ') { e.preventDefault(); this.go(this.state.idx + 1); }\n      else if (k === 'ArrowUp' || k === 'ArrowLeft' || k === 'PageUp') { e.preventDefault(); this.go(this.state.idx - 1); }\n      else if (k === 'Home') { e.preventDefault(); this.go(0); }\n      else if (k === 'End') { e.preventDefault(); this.go(this.slides.length - 1); }\n    };\n    window.addEventListener('keydown', this._onKey);\n\n    // Click anywhere advances; clicking an in-page anchor jumps to that slide; interactive\n    // controls (their own buttons/links/inputs) never trigger an advance.\n    this._onClick = (e) => {\n      const anchor = e.target.closest('a[href^=\"#\"]');\n      if (anchor) {\n        const id = anchor.getAttribute('href').slice(1);\n        const target = id ? document.getElementById(id) : this.slides[0];\n        const i = this.slides.indexOf(target);\n        if (i >= 0) { e.preventDefault(); this.go(i); return; }\n      }\n      if (e.target.closest('[data-prev]')) { this.go(this.state.idx - 1); return; }\n      if (e.target.closest('[data-next]')) { this.go(this.state.idx + 1); return; }\n      if (e.target.closest('button, a, input, textarea, select, [data-noadvance]')) return;\n      this.go(this.state.idx + 1);\n    };\n    document.addEventListener('click', this._onClick);\n\n    // Scale each slide's content block to fit its viewport (backgrounds stay full-bleed).\n    this._onResize = () => this.fit();\n    window.addEventListener('resize', this._onResize);\n    this.fit();\n    if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => this.fit());\n    setTimeout(() => this.fit(), 320);\n\n    this.syncDeck();\n  }\n  componentDidUpdate() { this.applyAll(); this.fit(); this.syncDeck(); }\n  componentWillUnmount() {\n    if (this._revealTimer) clearInterval(this._revealTimer);\n    if (this._revealScroll) window.removeEventListener('scroll', this._revealScroll);\n    if (this._onKey) window.removeEventListener('keydown', this._onKey);\n    if (this._onClick) document.removeEventListener('click', this._onClick);\n    if (this._onResize) window.removeEventListener('resize', this._onResize);\n  }\n  fit() {\n    if (!this.slides) return;\n    this.slides.forEach((sec) => {\n      const block = Array.from(sec.children).find((el) =>\n        el.tagName === 'DIV' &&\n        el.style.maxWidth === '1200px' &&\n        el.style.marginLeft === 'auto');\n      if (!block) return;\n      // Compact the original website paddings so content sits comfortably.\n      block.style.paddingTop = '28px';\n      block.style.paddingBottom = '28px';\n      block.style.transformOrigin = 'center center';\n      block.style.transform = 'none';\n      const availH = sec.clientHeight - 52 - 40;   // clear the fixed nav + breathing room\n      const availW = sec.clientWidth - 48;\n      const nh = block.scrollHeight;\n      const nw = block.scrollWidth;\n      let s = Math.min(availH / nh, availW / nw, 1);\n      if (!isFinite(s) || s <= 0) s = 1;\n      block.style.transform = s < 0.999 ? 'scale(' + s.toFixed(4) + ')' : 'none';\n    });\n  }\n  go(i) {\n    if (!this.slides || !this.slides.length) return;\n    const n = this.slides.length;\n    const clamped = Math.max(0, Math.min(n - 1, i));\n    if (clamped === this.state.idx) return;\n    this.setState({ idx: clamped });\n  }\n  syncDeck() {\n    if (!this.deck || !this.slides) return;\n    const idx = this.state.idx, n = this.slides.length;\n    this.deck.style.transform = 'translateY(' + (-idx * 100) + 'vh)';\n    const active = this.slides[idx];\n    if (active) active.scrollTop = 0;\n    const counter = document.querySelector('[data-counter]');\n    if (counter) counter.textContent = String(idx + 1).padStart(2, '0') + ' / ' + String(n).padStart(2, '0');\n    const prev = document.querySelector('[data-prev]'), next = document.querySelector('[data-next]');\n    if (prev) prev.disabled = idx === 0;\n    if (next) next.disabled = idx === n - 1;\n    const nav = document.querySelector('[data-nav]');\n    if (nav) nav.style.boxShadow = idx > 0 ? 'var(--shadow-md)' : 'none';\n  }\n  applyAll() {\n    const anims = this.props.scrollAnimations ?? true;\n    const tilt = this.props.phoneTilt ?? true;\n    const grid = this.props.showGrid ?? true;\n    document.querySelectorAll('[data-grid]').forEach((el) => { el.style.display = grid ? '' : 'none'; });\n    document.querySelectorAll('[data-tilt]').forEach((el) => {\n      const rest = el.getAttribute('data-tilt');\n      el.style.transition = 'transform 600ms cubic-bezier(0.16,1,0.3,1)';\n      el.style.transform = tilt ? rest : 'none';\n      if (tilt) {\n        el.onmouseenter = () => { el.style.transform = 'perspective(1400px) rotateY(0deg) rotateX(0deg)'; };\n        el.onmouseleave = () => { el.style.transform = rest; };\n      } else { el.onmouseenter = null; el.onmouseleave = null; }\n    });\n    if (this._revealTimer) { clearInterval(this._revealTimer); this._revealTimer = null; }\n    if (this._revealScroll) { window.removeEventListener('scroll', this._revealScroll); this._revealScroll = null; }\n    // Content is always visible (CSS [data-reveal]{opacity:1}). The optional entrance is a\n    // transform-only slide that NEVER touches opacity, so a frozen animation pipeline can only\n    // ever leave content fully visible — never hidden.\n    document.querySelectorAll('[data-reveal]').forEach((el) => {\n      el.style.opacity = '';\n      el.style.transform = '';\n      el.style.transition = '';\n      el.style.animation = 'none';\n    });\n  }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
